<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Warm-tinted soft shadows" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;background:var(--surface-page);font-family:var(--font-mono)}
  #s{display:flex;gap:26px;align-items:flex-end}
  .box{width:96px;height:70px;background:var(--surface-card);border-radius:var(--radius-md)}
  .n{font-size:10px;color:var(--text-muted);margin-top:10px;text-align:center}
</style></head><body>
<div id="s"></div>
<script>
  const t=[["xs","var(--shadow-xs)"],["sm","var(--shadow-sm)"],["md","var(--shadow-md)"],["lg","var(--shadow-lg)"],["pin","var(--shadow-pin)"]];
  document.getElementById("s").innerHTML=t.map(([n,v])=>`<div><div class="box" style="box-shadow:${v}"></div><div class="n">${n}</div></div>`).join("");
</script>
</body></html>
