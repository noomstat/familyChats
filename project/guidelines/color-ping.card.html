<!-- @dsCard group="Colors" viewport="700x150" name="Ping — live / presence" subtitle="Location sharing, online, on-the-way" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-body)}
  .sw{display:flex;gap:8px}
  .c{flex:1;height:76px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:7px;box-sizing:border-box;font-family:var(--font-mono);font-size:10px}
  .n{margin-top:6px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center}
  .col{flex:1}
</style></head><body>
<div class="sw" id="s"></div>
<script>
  const steps=[["100","#C4F5E0","#073F30"],["300","#4FDCA3","#073F30"],["500 ★","#12B886","#fff"],["600","#0E9C72","#fff"],["700","#0B7A5A","#fff"],["900","#073F30","#fff"]];
  document.getElementById("s").innerHTML=steps.map(([n,v,fg])=>`<div class="col"><div class="c" style="background:${v};color:${fg}">${v}</div><div class="n">ping ${n}</div></div>`).join("");
</script>
</body></html>
