<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & surfaces" subtitle="Info, success, warning, danger + paper" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-page);font-family:var(--font-body)}
  .sw{display:flex;gap:8px}
  .c{flex:1;height:76px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:7px;box-sizing:border-box;font-family:var(--font-mono);font-size:10px;border:1px solid rgba(0,0,0,.06)}
  .n{margin-top:6px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center}
  .col{flex:1}
</style></head><body>
<div class="sw" id="s"></div>
<script>
  const steps=[["info","#2E72E8","#fff"],["success","#12B886","#fff"],["warning","#F5A623","#1A1613"],["danger","#E23D5B","#fff"],["paper","#FAF6F1","#1A1613"],["card","#FFFFFF","#1A1613"]];
  document.getElementById("s").innerHTML=steps.map(([n,v,fg])=>`<div class="col"><div class="c" style="background:${v};color:${fg}">${v}</div><div class="n">${n}</div></div>`).join("");
</script>
</body></html>
