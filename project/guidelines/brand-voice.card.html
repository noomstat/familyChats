<!-- @dsCard group="Brand" viewport="700x210" name="Voice & tone" subtitle="Warm, brief, in-the-moment — never surveillance-y" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-page);font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:14px 16px}
  .tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
  .yes .tag{color:var(--ping-600)} .no .tag{color:var(--rose-500)}
  .t{color:var(--text-strong);font-size:15px}
</style></head><body>
  <div class="card yes"><div class="tag">✓ Say</div><div class="t">"You're sharing live for 1 hour. Stop anytime."</div></div>
  <div class="card no"><div class="tag">✗ Not</div><div class="t">"Location tracking is now enabled on your device."</div></div>
  <div class="card yes"><div class="tag">✓ Say</div><div class="t">"Rally the group — 3 already on the way."</div></div>
  <div class="card no"><div class="tag">✗ Not</div><div class="t">"Initiate group coordination sequence."</div></div>
</body></html>
