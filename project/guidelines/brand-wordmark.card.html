<!-- @dsCard group="Brand" viewport="700x160" name="Wordmark (type-based)" subtitle="No logo supplied — the name set in the display face" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;background:var(--surface-page);display:flex;align-items:center;gap:40px}
  .mark{display:flex;align-items:center;gap:14px}
  .pin{position:relative;width:40px;height:40px}
  .drop{position:absolute;inset:0;background:var(--coral-500);border-radius:50% 50% 50% 0;transform:rotate(45deg);box-shadow:var(--shadow-pin);border:3px solid #fff}
  .r{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);font-weight:800;font-size:19px}
  .word{font-family:var(--font-display);font-weight:800;font-size:38px;color:var(--text-strong);letter-spacing:-.03em}
  .mono{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);letter-spacing:.05em}
</style></head><body>
  <div>
    <div class="mark"><span class="pin"><span class="drop"></span><span class="r">R</span></span><span class="word">Rally</span></div>
    <div class="mono" style="margin-top:12px">pin lockup · light</div>
  </div>
  <div style="background:var(--ink-900);padding:22px 28px;border-radius:var(--radius-lg)">
    <div class="mark"><span class="pin"><span class="drop"></span><span class="r">R</span></span><span class="word" style="color:#fff">Rally</span></div>
    <div class="mono" style="margin-top:12px;color:var(--ink-300)">on ink</div>
  </div>
</body></html>
