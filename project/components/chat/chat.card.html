<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); display: grid; grid-template-columns: 1fr 300px; gap: 22px; }
  .thread { display: flex; flex-direction: column; gap: 10px; }
  .list { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 6px; box-shadow: var(--shadow-sm); align-self: start; }

<body>
<div class="thread" id="thread"></div>
<div class="list" id="list"></div>
<script type="text/babel">
  const { ChatBubble, ConversationRow, LocationTile } = window.RallyDesignSystem_84ab56;
  ReactDOM.createRoot(document.getElementById("thread")).render(
    <>
      <ChatBubble author="Mara" time="14:32">on my way — 5 min out</ChatBubble>
      <ChatBubble mine time="14:32">meet at the fountain?</ChatBubble>

    </>
  );
  ReactDOM.createRoot(document.getElementById("list")).render(
    <>
      <ConversationRow name="Trail Crew" preview="Mara: on my way, 5 min" time="14:32" unread={3} live members={6} active />
      <ConversationRow name="Dev Kaur" preview="see you there" time="Mon" />
      <ConversationRow name="Weekend Climb" preview="Sam shared a location" time="Sun" members={4} />
